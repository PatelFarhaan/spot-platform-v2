version: "3.8"

networks:
  spotops_monitoring:

x-logging:
  &default-logging
  driver: loki
  options:
    keep-file: "false"
    loki-url: https://internal.loki.biosapplication.com/loki/api/v1/push
    loki-external-labels: "instance=${HOSTNAME},application=${APPLICATION},environment=${ENVIRONMENT},container_name={{.Name}}"

services:
  minio:
    container_name: minio
    logging: *default-logging
    image: quay.io/minio/minio
    environment:
      - "MINIO_ROOT_USER=${MINIO_ROOT_USER}"
      - "MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}"
    volumes:
      - minio-data:/data
    networks:
      - spotops_monitoring
    command: server /data --console-address ":9091"
    ports:
      - "9000:9000"

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:0.10.0
    container_name: nginx_exporter
    restart: always
    depends_on:
      - nginx
    command:
      -nginx.scrape-uri=http://nginx:8081/stub_status
    ports:
      - "9113:9113"
    networks:
      - spotops_monitoring

  node_exporter:
    pid: "host"
    restart: always
    container_name: node_exporter
    image: quay.io/prometheus/node-exporter:latest
    ports:
      - "9100:9100"
    networks:
      - spotops_monitoring
    command:
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--path.procfs=/host/proc'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/rootfs:ro
      - /sys:/host/sys:ro
      - /proc:/host/proc:ro
    deploy:
      resources:
        limits:
          memory: 25M

  cadvisor:
    restart: always
    privileged: true
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /cgroup:/cgroup:ro
      - /var/run:/var/run:ro
      - /dev/disk:/dev/disk/:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - spotops_monitoring
    deploy:
      resources:
        limits:
          memory: 100M

  nginx:
    image: nginx
    restart: always
    container_name: nginx
    logging: *default-logging
    ports:
      - "80:80"
      - "9999:9999"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - spotops_monitoring
    deploy:
      resources:
        limits:
          memory: 50M


volumes:
  minio-data:
