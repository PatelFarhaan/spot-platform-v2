env: production
region: us-east-1
key_name: bios-new
ebs_volume_size: 8
app: biosmesh-telemetry
export_config_to_s3: true
create_obs_ingress_rule: false
ebs_multi_attach_volume_size: 20
dc_config_bucket_name: observability

availability_zones:
  - us-east-1a

od_config:
  instance_types:
    - t3.small
    - t3.medium
    - t3.large
  auto_scaling_group:
    min_instances: 0
    max_instances: 1
    desired_instances: 0

spot_config:
  instance_types:
    - t3.small
    - t3.medium
    - t3.large
  auto_scaling_group:
    min_instances: 0
    max_instances: 1
    desired_instances: 1

dns_names:
  - name: loki
    internal_port: 80
    external_port: 80
    dns: "internal.loki.biosapplication.com"
  - name: fortio
    internal_port: 80
    external_port: 80
    dns: "internal.fortio.biosapplication.com"
  - name: grafana
    internal_port: 80
    external_port: 80
    dns: "internal.grafana.biosapplication.com"
  - name: prometheus
    internal_port: 9090
    external_port: 9090
    dns: "internal.prometheus.biosapplication.com"

tags:
  Owner: Bios
  MCP_SD: true
  Developer: Farhaan
  Provisioner: Terraform
  Environment: production
  Name: biosmesh-platform-telemetry
  Application: biosmesh-platform-telemetry

iam_policies: >
  [
    {
      "Resource": "*",
      "Effect": "Allow",
      "Action": [
        "ec2:Describe*",
        "ec2:AttachVolume",
        "ec2:DescribeVolumes"
      ]
    },
    {
      "Resource": "*",
      "Effect": "Allow",
      "Action": [
        "iam:ListInstanceProfiles"
      ]
    },
    {
      "Resource": "*",
      "Effect": "Allow",
      "Action": [
        "cloudwatch:Describe*",
        "cloudwatch:ListMetrics",
        "cloudwatch:GetMetricData",
        "cloudwatch:GetMetricStatistics"
      ]
    },
    {
      "Resource": "*",
      "Effect": "Allow",
      "Action": "autoscaling:Describe*"
    },
    {
      "Resource": "*",
      "Effect": "Allow",
      "Action": "elasticloadbalancing:Describe*"
    },
    {
      "Effect": "Allow",
      "Action": [
        "s3:GetObject",
        "s3:ListBucket"
      ],
      "Resource": [
        "arn:aws:s3:::var.mcp_spot_bucket/observability/"
      ]
    },
    {
      "Action": "s3:ListBucket",
      "Effect": "Allow",
      "Resource": [
        "arn:aws:s3:::var.mcp_spot_bucket"
      ]
    },
    {
      "Action": "s3:GetObject",
      "Effect": "Allow",
      "Resource": [
        "arn:aws:s3:::var.mcp_spot_bucket/*"
      ]
    }
  ]
