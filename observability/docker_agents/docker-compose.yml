version: "3.8"

networks:
  spotops_monitoring:


x-logging:
  &default-logging
  driver: loki
  options:
    keep-file: "false"
    loki-url: https://internal.loki.biosapplication.com/loki/api/v1/push
    loki-external-labels: "instance=${HOSTNAME},application=${APPLICATION},environment=${ENVIRONMENT},container_name={{.Name}}"


services:
  prometheus:
    user: root
    restart: always
    image: prom/prometheus
    logging: *default-logging
    container_name: prometheus
    volumes:
      - /mnt/maebs/prometheus:/prometheus:rw
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    expose:
      - 9090
    command:
      --web.enable-lifecycle
      --storage.tsdb.retention.time=7d
      --enable-feature=exemplar-storage
      --web.enable-remote-write-receiver
      --config.file=/etc/prometheus/prometheus.yml
    networks:
      - spotops_monitoring

  alertmanager:
    restart: always
    container_name: alertmanager
    image: prom/alertmanager:v0.23.0
    expose:
      - 9093
    volumes:
      - /mnt/maebs/alertmanager:/data:rw
      - ./alert_manager/alertmanager.yml:/config/alertmanager.yml:ro
    command:
      --config.file=/config/alertmanager.yml --log.level=debug
    networks:
      - spotops_monitoring

  loki:
    container_name: loki
    image: grafana/loki
    volumes:
      - /mnt/maebs/loki:/data/loki:rw
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    expose:
      - 3100
    restart: always
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - spotops_monitoring

  grafana:
    user: root
    image: grafana/grafana
    container_name: "grafana"
    logging: *default-logging
    volumes:
      - /mnt/maebs/grafana:/var/lib/grafana:rw
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/dashboards/home.json:/default-dashboard.json:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:rw
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:rw
    environment:
      - "GF_INSTALL_PLUGINS=grafana-worldmap-panel,grafana-polystat-panel,novatec-sdg-panel,macropower-analytics-panel,pyroscope-datasource,pyroscope-panel"
    expose:
      - 3000
    restart: always
    networks:
      - spotops_monitoring

  cadvisor:
    image: zcube/cadvisor
    container_name: cadvisor
    restart: always
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /var/run:/var/run:ro
      - /dev/disk:/dev/disk/:ro
      - /var/lib/docker/:/var/lib/docker:ro
    expose:
      - 8080
    networks:
      - spotops_monitoring

  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    restart: always
    pid: "host"
    expose:
      - 9100
    networks:
      - spotops_monitoring

  pyroscope:
    container_name: pyroscope
    image: pyroscope/pyroscope:latest
    expose:
      - 4040
    command:
      - server
    environment:
      - PYROSCOPE_LOG_LEVEL=info
      - PYROSCOPE_WAIT_AFTER_STOP=true
    networks:
      - spotops_monitoring

  nginx:
    image: nginx
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "9090:9090"
      - "9093:9093"
      - "9999:9999"
    logging: *default-logging
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - spotops_monitoring

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:0.10.0
    container_name: nginx_exporter
    restart: always
    depends_on:
      - nginx
    command:
      -nginx.scrape-uri=http://nginx:8080/stub_status
    expose:
      - 9113
    networks:
      - spotops_monitoring

  fortio:
    restart: always
    image: fortio/fortio
    container_name: fortio
    volumes:
      - /mnt/maebs/fortio:/fortio/data
    expose:
      - 8080
    networks:
      - spotops_monitoring

