version: "3.8"
services:
  vault-server:
    image: vault:latest
    volumes:
      - ./volume_mounts/data:/vault/data
      - ./volume_mounts/config:/vault/config
    ports:
      - "8200:8200"
    environment:
      - "HOME=/vault/data"
      - "VAULT_ADDR=http://127.0.0.1:8200"
      - "VAULT_ADDRESS=http://127.0.0.1:8200"
      - "VAULT_API_ADDR=http://127.0.0.1:8200"
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/vault_config.hcl
