version: "3.8"

networks:
  spotops_monitoring:

x-logging:
  &default-logging
  driver: "json-file"
  options:
    tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

services:
  promtail:
    container_name: promtail
    image: grafana/promtail:2.4.0
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    restart: always
    command:
      -config.expand-env=true
      -config.file=/etc/promtail/promtail-config.yml
    environment:
      - "LOKI_URL=${LOKI_URL}"
      - "HOSTNAME=${HOSTNAME}"
      - "APPLICATION=${APPLICATION}"
      - "ENVIRONMENT=${ENVIRONMENT}"
    deploy:
      resources:
        limits:
          memory: 30M
    networks:
      - spotops_monitoring

  node_exporter:
    pid: "host"
    restart: always
    container_name: node_exporter
    image: quay.io/prometheus/node-exporter:latest
    ports:
      - "9100:9100"
    networks:
      - spotops_monitoring
    command:
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--path.procfs=/host/proc'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/rootfs:ro
      - /sys:/host/sys:ro
      - /proc:/host/proc:ro
    deploy:
      resources:
        limits:
          memory: 20M

  cadvisor:
    restart: always
    privileged: true
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /cgroup:/cgroup:ro
      - /var/run:/var/run:ro
      - /dev/disk:/dev/disk/:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - spotops_monitoring
    deploy:
      resources:
        limits:
          memory: 100M

  nginx:
    image: nginx
    restart: always
    container_name: nginx
    logging: *default-logging
    ports:
      - "80:80"
      - "9999:9999"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - spotops_monitoring
    deploy:
      resources:
        limits:
          memory: 30M

  jenkins:
    build:
      context: ./custom_jenkins_image/
      dockerfile: Dockerfile
    container_name: jenkins
    privileged: true
    restart: always
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - ./auto_scaler:/auto_scaler:rw
      - /usr/bin/docker:/usr/bin/docker
      - spotops-jenkins:/var/jenkins_home:rw
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - spotops_monitoring

  vault-server:
    image: vault:latest
    restart: always
    container_name: vault-server
    volumes:
      - ./config:/vault/config
    ports:
      - "8200:8200"
    environment:
      - "VAULT_ADDR=http://127.0.0.1:8200"
      - "VAULT_ADDRESS=http://127.0.0.1:8200"
      - "VAULT_API_ADDR=http://127.0.0.1:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - spotops_deployment
    command: vault server -config=/vault/config/vault_config.json

  vault-ops:
    build:
      context: unseal_sidecar
      dockerfile: unseal_sidecar/Dockerfile
    container_name: vault-ops
    user: root
    environment:
      - "S3_VAULT_BUCKET=biosmesh-vault"
      - "VAULT_ADDRESS=http://vault-server:8200"
      - "VAULT_CONFIG_FILE=/config/vault_config.json"
      - "S3_VAULT_FILENAME=internal_vault_config/keys.json"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/vault_config.json:/config/vault_config.json
    depends_on:
      - vault-server
    networks:
      - spotops_deployment


volumes:
  spotops-jenkins:
