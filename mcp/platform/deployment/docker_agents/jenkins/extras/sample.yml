apiVersion: v1
metadata:
  env: development
  name: backend-apis
  region: us-east-1
  personalCluster: false
  tags:
    app: backend-apis
    optimize_spot: true
dns:
  name: www.development.biosapplication.com
  redirectHtppToHttps: false
  servicePorts:
    - port: 80
      targetPort: 8000
notifications:
  slack:
    channel: spotops-alerts
deployment:
  maxSurge: "?"
  waitForConnectionDraining: true
  deployOnPushToMaster: true
  ci:
    branch: master
    dockerFilePath: .
    gitUrl: https://gitlab.com/b1115/backend-apis.git
  infra:
    node:
      resources:
        limit:
          cpu: 10
          memory: 16Gi
      type: savings
      baseDiskSize: 8
      AWSPolicyArn: null
    containers:
      image: $branch-commit-id
      containerPorts:
        - 8000
      env:
        foo: bar
      secrets:
        - key1
        - key2
