  grafana:
    user: root
    image: grafana/grafana
    container_name: "grafana"
    volumes:
      - spotops-grafana:/var/lib/grafana:rw
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:rw
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:rw
    environment:
      - "GF_INSTALL_PLUGINS=grafana-worldmap-panel,grafana-polystat-panel,novatec-sdg-panel,macropower-analytics-panel"
    expose:
      - 3000
    restart: always
    networks:
      - spotops_monitoring

  cadvisor:
    image: zcube/cadvisor
    container_name: cadvisor
    restart: always
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /var/run:/var/run:ro
      - /dev/disk:/dev/disk/:ro
      - /var/lib/docker/:/var/lib/docker:ro
    expose:
      - 8080
    networks:
      - spotops_monitoring

  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    restart: always
    pid: "host"
    expose:
      - 9100
    networks:
      - spotops_monitoring

  nginx:
    image: nginx
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "9090:9090"
      - "9093:9093"
      - "9999:9999"
    logging: *default-logging
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - spotops_monitoring

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:0.10.0
    container_name: nginx_exporter
    restart: always
    depends_on:
      - nginx
    command:
      -nginx.scrape-uri=http://nginx:8080/stub_status
    expose:
      - 9113
    networks:
      - spotops_monitoring

  fortio:
    restart: always
    image: fortio/fortio
    container_name: fortio
    expose:
      - 8080
    networks:
      - spotops_monitoring


volumes:
  spotops-loki:
  spotops-tempo:
  spotops-grafana:
  spotops-prometheus:
  spotops-alertmanager:
