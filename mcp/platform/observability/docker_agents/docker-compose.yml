version: "3.8"

networks:
  spotops_monitoring:


x-logging:
  &default-logging
  driver: loki
  options:
    keep-file: "false"
    loki-url: https://mcp.observability.***REMOVED***/loki/api/v1/push
    loki-external-labels: "instance=mcp,application=mcp-observability,environment=production,container_name={{.Name}}"


services:
  prometheus:
    user: root
    restart: always
    image: prom/prometheus
    logging: *default-logging
    container_name: prometheus
    volumes:
      - spotops-prometheus:/prometheus:rw
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    expose:
      - 9090
    environment:
      - "region=${AWS_REGION}"
    command:
      --web.enable-lifecycle
      --storage.tsdb.retention.time=7d
      --enable-feature=exemplar-storage
      --web.enable-remote-write-receiver
      --config.file=/etc/prometheus/prometheus.yml
    networks:
      - spotops_monitoring

  alertmanager:
    restart: always
    container_name: alertmanager
    image: prom/alertmanager:v0.23.0
    expose:
      - 9093
    volumes:
      - spotops-alertmanager:/data:rw
      - ./alert_manager/alertmanager.yml:/config/alertmanager.yml:ro
    command:
      --config.file=/config/alertmanager.yml --log.level=debug
    networks:
      - spotops_monitoring

  loki:
    container_name: loki
    image: grafana/loki:2.4.0
    volumes:
      - spotops-loki:/data/loki:rw
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    expose:
      - 3100
    restart: always
    environment:
      - "HOSTNAME=mcp"
      - "ENV=production"
      - "APPLICATION=mcp-observability"
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - spotops_monitoring

