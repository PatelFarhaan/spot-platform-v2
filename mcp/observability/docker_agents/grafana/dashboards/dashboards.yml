apiVersion: 1

providers:
  - name: 'Prometheus'
    type: file
    editable: true
    allowUiUpdates: true
    disableDeletion: true
    options:
      foldersFromFilesStructure: true
      path: /etc/grafana/provisioning/dashboards/

  - name: 'Loki'
    type: file
    editable: true
    allowUiUpdates: true
    disableDeletion: true
    options:
      foldersFromFilesStructure: true
      path: /etc/grafana/provisioning/dashboards/
