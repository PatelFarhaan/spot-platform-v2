region: us-east-1
ecr_name: biosmesh-all-apps
dns_name: biosapplication.com
zone_id: Z1023527RS6FKHEBV4ZZ
vpc_id: vpc-08da13046fc0ea8fc
lb_algorithm_type: round_robin
kms_name: mcp_bios_vault_auto_unseal
global_dev_apps_lb_name: global-dev-apps
dynamodb_name: bios-dynamodb-tflock-state

tags:
  Owner: Bios
  Developer: Farhaan
  Application: mcp-init
  Provisioner: Terraform
  Name: biosmesh-mcp-init
  Environment: production

s3_buckets:
  vault: biosmesh-vault
  mcp: biosmesh-spot-plane
  workers: biosmesh-apps-config
  tfstate: biosmesh-apps-tf-state

subnet_ids:
  - subnet-00559225548afa7d4
  - subnet-078d8ce666dcbd6ba
  - subnet-0c73f4d65aef7adf4
  - subnet-0e3597bed0f180f79
  - subnet-0d75bad323fdb2481
  - subnet-0c26209bd1cfeeac6

security_groups:
  instance:
    ingress: [ ]
  alb:
    ingress:
      - to_port: 80
        from_port: 80
        protocol: tcp
        description: "HTTP from VPC"
        cidr_blocks:
          - "0.0.0.0/0"

      - to_port: 443
        from_port: 443
        protocol: tcp
        description: "TLS from VPC"
        cidr_blocks:
          - "0.0.0.0/0"

      - to_port: 27017
        from_port: 27017
        protocol: tcp
        description: "MongoDB Connections"
        cidr_blocks:
          - "0.0.0.0/0"

      - to_port: 3306
        from_port: 3306
        protocol: tcp
        description: "Mysql Connections"
        cidr_blocks:
          - "0.0.0.0/0"

      - to_port: 5432
        from_port: 5432
        protocol: tcp
        description: "Postgres Connections"
        cidr_blocks:
          - "0.0.0.0/0"

      - to_port: 6379
        from_port: 6379
        protocol: tcp
        description: "Redis Connections"
        cidr_blocks:
          - "0.0.0.0/0"
