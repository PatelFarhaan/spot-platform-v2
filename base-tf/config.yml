  - subnet-0c73f4d65aef7adf4
  - subnet-0e3597bed0f180f79
  - subnet-0d75bad323fdb2481
  - subnet-0c26209bd1cfeeac6

security_groups:
  global_mcp_apps:
    instance:
      ingress: [ ]
    alb:
      ingress:
        - to_port: 80
          from_port: 80
          protocol: tcp
          description: "HTTP from VPC"
          cidr_blocks:
            - "0.0.0.0/0"

        - to_port: 443
          from_port: 443
          protocol: tcp
          description: "TLS from VPC"
          cidr_blocks:
            - "0.0.0.0/0"

        - to_port: 9090
