          from_port: 9093
          protocol: tcp
          description: "Nginx Exporter Connection"
          cidr_blocks:
            - "0.0.0.0/0"
  global_dev_apps:
    instance:
      ingress: [ ]
    alb:
      ingress:
        - to_port: 80
          from_port: 80
          protocol: tcp
          description: "HTTP from VPC"
