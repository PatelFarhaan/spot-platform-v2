version: "3.8"

networks:
  spotops_deployment:


x-logging:
  &default-logging
  driver: loki
  options:
    keep-file: "false"
    loki-url: https://internal.loki.biosapplication.com/loki/api/v1/push
    loki-external-labels: "instance=${HOSTNAME},application=${APPLICATION},environment=${ENVIRONMENT},container_name={{.Name}}"


services:
  promtail:
    container_name: promtail
    image: grafana/promtail:2.4.0
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    restart: always
    command:
      -config.expand-env=true
      -config.file=/etc/promtail/promtail-config.yml
    environment:
      - "HOSTNAME=${HOSTNAME}"
      - "ENVIRONMENT=${ENVIRONMENT}"
      - "APPLICATION=${APPLICATION}"
      - "LOKI_URL=https://internal.loki.biosapplication.com/loki/api/v1/push"
    deploy:
      resources:
        limits:
          memory: 30M

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:0.10.0
    container_name: nginx_exporter
    restart: always
    depends_on:
      - nginx
    command:
      -nginx.scrape-uri=http://nginx:8081/stub_status
    ports:
      - "9113:9113"
    networks:
      - spotops_deployment

  node_exporter:
    pid: "host"
    restart: always
    container_name: node_exporter
    image: quay.io/prometheus/node-exporter:latest
    ports:
      - "9100:9100"
    networks:
      - spotops_deployment
    command:
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--path.procfs=/host/proc'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/rootfs:ro
      - /sys:/host/sys:ro
      - /proc:/host/proc:ro
    deploy:
      resources:
        limits:
          memory: 20M

  pyroscope:
    container_name: pyroscope
    image: pyroscope/pyroscope:latest
    ports:
      - "4040:4040"
    command:
      - server
    environment:
      - PYROSCOPE_LOG_LEVEL=info
      - PYROSCOPE_WAIT_AFTER_STOP=true
    networks:
      - spotops_deployment

  cadvisor:
    restart: always
    privileged: true
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /cgroup:/cgroup:ro
      - /var/run:/var/run:ro
      - /dev/disk:/dev/disk/:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - spotops_deployment
    deploy:
      resources:
        limits:
          memory: 100M

  nginx:
    image: nginx
    restart: always
    container_name: nginx
    logging: *default-logging
    ports:
      - "80:80"
      - "8200:8200"
      - "9999:9999"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - spotops_deployment
    deploy:
      resources:
        limits:
          memory: 30M

  jenkins:
    build:
      context: jenkins
      dockerfile: Dockerfile
    container_name: jenkins
    restart: always
    privileged: true
    logging: *default-logging
    expose:
      - 8080
    volumes:
      - /usr/bin/docker:/usr/bin/docker
      - /mnt/maebs/jenkins:/var/jenkins_home:rw
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - spotops_deployment

  sidecar:
    build:
      context: sidecar
      dockerfile: Dockerfile
    restart: on-failure
    container_name: sidecar
    logging: *default-logging
    environment:
      - "SPOT_BUCKET_NAME=biosmesh-spot-plane"
    volumes:
      - ./vault/config:/vault/config

  vault-server:
    image: vault:latest
    restart: always
    logging: *default-logging
    container_name: vault-server
    volumes:
      - ./vault/config:/vault/config
    expose:
      - 8200
    environment:
      - "VAULT_ADDR=http://127.0.0.1:8200"
      - "VAULT_API_ADDR=http://127.0.0.1:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - spotops_deployment
    command: vault server -config=/vault/config/config.json
    depends_on:
      sidecar:
        condition: service_completed_successfully

  vault-ops:
    build:
      context: vault/unseal_sidecar
      dockerfile: Dockerfile
    container_name: vault-ops
    logging: *default-logging
    user: root
    environment:
      - "S3_VAULT_BUCKET=biosmesh-vault"
      - "VAULT_ADDR=http://vault-server:8200"
      - "VAULT_CONFIG_FILE=/config/config.json"
      - "S3_VAULT_FILENAME=internal_vault_config/keys.json"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./vault/config/config.json:/config/config.json
    depends_on:
      vault-server:
        condition: service_started
      sidecar:
        condition: service_completed_successfully
    networks:
      - spotops_deployment
