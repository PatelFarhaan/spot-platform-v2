apiVersion: alpha/v1

metadata:
  env: development
  name: backend-apis
  region: us-east-1
  personalCluster: false
  tags:
    app: backend-apis
    optimize_spot: true

routing:
  name: www.development.biosapplication.com
  redirectHttpToHttps: false
  servicePorts:
    - externalPort: 80
      internalPort: 8000

notifications:
  slack:
    channel: spotops-alerts

rateLimit:
  rate: 10/s
  burst: 0
  nodelay: true

deployment:
  replicaPerHost: -1
  maxSurge: "?"
  deployOnPushToMaster: true
  waitForConnectionDraining: true
  ci:
    branch: master
    dockerFilePath: .
    gitUrl: https://gitlab.com/b1115/backend-apis.git
  infra:
    node:
      resources:
        limit:
          cpu: 10
          memory: 16Gi
      type: savings
      baseDiskSize: 8
      AWSPolicyArn: null
    containers:
      image: $branch-commit-id
      containerPorts:
        - 8000
      env:
        foo: bar
      secrets:
        - key1
        - key2
