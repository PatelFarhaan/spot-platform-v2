app: memcache
env: development
volume_type: gp3
region: us-east-1
prefix_name: spot-
ebs_volume_size: 8
ssh_key_name: bios-new
internal_platform: biosmesh
ami_id: ami-0fbf45d0b1fef0326
internal_zone_name: ***REMOVED***
internal_mcp_sg_id: sg-0351d2fc7e8a2d5dc
cooldown_and_deregistration_metadata: { }
internal_spot_plane_bucket: biosmesh-spot-plane
internal_s3_worker_bucket: biosmesh-apps-config
internal_global_lb_name: global-dev-apps-us-east-1
internal_s3_spot_plane_bucket: biosmesh-spot-plane
internal_lb_algorithm_type: least_outstanding_requests
internal_ecr_mcp: ***REMOVED***.dkr.ecr.us-east-1.amazonaws.com/biosmesh-internal-apps
internal_global_dev_apps_lb_arn: arn:aws:elasticloadbalancing:us-east-1:***REMOVED***:loadbalancer/app/global-dev-apps-us-east-1/10aa052609edd2f3

routing:
  - name: memcache
    internal_port: 11211
    external_port: 11211
    dns: "memcache.***REMOVED***"

client_defined_policies:
  - Resource: "*"
    Effect: Allow
    Action: ec2:DescribeTags
    Condition:
      StringEquals:
        ec2:ResourceTag/nullKey: Base Client Default Policy

sns_subscriptions:
  - protocol: email
    endpoint: alerts-aaaah47nucbqcucr6ihs3drml4@biosdevelopment.slack.com

tags:
  Owner: Bios
  MCP_SD: true
  Platform: biosmesh
  Application: memcache
  Provisioner: Terraform
  Environment: development
  spotops.delete_ebs: true

od_config:
  instance_type:
    - t4g.medium
    - t3a.medium
    - m6g.medium
  auto_scaling_group:
    min_instances: 0
    max_instances: 1
    desired_instances: 0

spot_config:
  instance_type:
    - t4g.medium
    - t3a.medium
    - m6g.medium
  auto_scaling_group:
    min_instances: 0
    max_instances: 1
    desired_instances: 1
