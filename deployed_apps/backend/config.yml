name: backend
tcpApp: false
appType: public
region: us-east-1

tags:
  Owner: Bios
  MCP_SD: true
  Platform: biosmesh
  Provisioner: Terraform

routing:
  - name: backend
    dnsName: development.biosapplication.com
    httpsRedirect: false
    servicePorts:
      external: 80
      internal: 5000
    rateLimit:
      rate: 10r/s
      burst: 0
      nodelay: true

iam:
  policy_arn: [ ]
  policy_definition:
    - Resource: "*"
      Effect: Allow
      Action: ec2:DescribeTags
      Condition:
        StringEquals:
          ec2:ResourceTag/nullKey: Base Client Default Policy
    - Resource: "*"
      Effect: Allow
      Action:
        - ses:*
    - Effect: Allow
      Action:
        - s3:*
      Resource:
        - arn:aws:s3:::bios-3d-models
        - arn:aws:s3:::bios-3d-models/*

alerts:
  - protocol: email
    endpoint: alerts-aaaah47nucbqcucr6ihs3drml4@biosdevelopment.slack.com

deployment:
  baseDiskSize: 8
  replicaPerHost: -1
  statefulset: false
  nodePreference: spot
  personalCluster: false
  imageRegistry: internal
  environment: development
  version: development-backend-77d71e132ebfde0ad8f437a6522f9d75a7d5f8fc
  extraConfig:
    commands: [ ]

  resources:
    limit:
      cpu: 10
      memory: 16Gi

  autoScalingGroup:
    instanceType:
      - t3.small
      - t3.medium
      - t3.large
    spot:
      minInstances: 0
      maxInstances: 1
      desiredInstances: 1
    od:
      minInstances: 0
      maxInstances: 1
      desiredInstances: 0

  livenessProbe:
    httpGet:
      port: 9999
      path: /internal/spotops/health
    periodSeconds: 120
